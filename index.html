<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #fff; }
  iframe { display: block; width: 100%; height: 100%; border: 0; }
  #loader {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #fff; font-family: 'Trebuchet MS', sans-serif; color: #8a8a8a; font-size: 15px;
    transition: opacity .4s; pointer-events: none;
  }

<body>
<div id="loader">Загружаем данные…</div>
<iframe id="app" src="https://script.google.com/macros/s/AKfycbzSwlTKqcqsMn25nGiFurF6hJuXqIX-Wga8VwPwgfasCa-fxg7HAqjjZ8IW2sZ6jfkW/exec" allow="clipboard-write"></iframe>
<script>
  var SRC = document.getElementById('app').src;
  var tries = 0;
  document.getElementById('app').addEventListener('load', function () {
    document.getElementById('loader').style.opacity = 0;
  });
  // Одна автоматическая перезагрузка: страховка от сбоя первого запроса
  // к Apps Script в сессии без cookie (инкогнито, первый визит).
  setTimeout(function () {
    if (sessionStorage.getItem('retried')) return;
    sessionStorage.setItem('retried', '1');
    if (tries === 0) {
      tries = 1;
      document.getElementById('app').src = SRC + (SRC.indexOf('?') < 0 ? '?' : '&') + 'r=' + Date.now();
    }
  }, 2500);
</script>
