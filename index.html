<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #fff; }
  iframe { display: block; width: 100%; height: 100%; border: 0; }
  #loader {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 18px;
    background: #fff; transition: opacity .4s; pointer-events: none;
  }
  #loader .mark {
    width: 52px; height: 52px;
    animation: pulse 1.6s ease-in-out infinite;
  }
  #loader .brand {
    font-family: 'Unbounded', sans-serif; font-weight: 600;
    font-size: 15px; letter-spacing: .06em; color: #111;
  }
  #loader .note {
    font-family: 'Montserrat', 'Trebuchet MS', sans-serif;
    font-size: 13px; color: #8a8a8a;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(.92); opacity: .75; }
  }
  @media (prefers-reduced-motion: reduce) {
    #loader .mark { animation: none; }
  }

<script>
  var SRC = document.getElementById('app').src;
  var tries = 0;
  document.getElementById('app').addEventListener('load', function () {
    document.getElementById('loader').style.opacity = 0;
  });
  // Одна автоматическая перезагрузка: страховка от сбоя первого запроса
  // к Apps Script в сессии без cookie (инкогнито, первый визит).
  setTimeout(function () {
    if (sessionStorage.getItem('retried')) return;
    sessionStorage.setItem('retried', '1');
    if (tries === 0) {
      tries = 1;
      document.getElementById('app').src = SRC + (SRC.indexOf('?') < 0 ? '?' : '&') + 'r=' + Date.now();
    }
  }, 2500);
</script>
